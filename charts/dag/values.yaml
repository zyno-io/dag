replicaCount: 1

image:
  repository: ghcr.io/signal24/dag/server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ''

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

serviceAccount:
  create: true
  annotations: {}
  name: ''

postgres:
  host: ''
  port: 5432
  user: dag
  password: ''
  database: dag

redis:
  host: ''
  port: 6379

bull:
  redisHost: ''
  redisPort: 6379
  queue: dag

broadcast:
  redisHost: ''
  redisPort: 6379

config:
  appEnv: production
  mutexMode: local
  deployMonitorTimeoutSecs: 300
  cryptoSecret: ''

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
    - host: dag.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

podLabels: {}
