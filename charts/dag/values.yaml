replicaCount: 1

image:
  repository: ghcr.io/zyno-io/dag/server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ''

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

serviceAccount:
  create: true
  annotations: {}
  name: ''

postgres:
  host: ''
  port: 5432
  user: dag
  password: ''
  database: dag
  ssl: false
  sslRejectUnauthorized: true

config:
  appEnv: production
  deployMonitorTimeoutSecs: 300
  cryptoSecret: ''
  # Signs management-UI session tokens. Rotating it logs everyone out.
  authJwtSecret: ''
  # Public origin of the management UI; the GitLab OAuth redirect must land here.
  publicBaseUrl: ''
  # Optional extra comma-separated origins allowed as OAuth redirect targets.
  oauthRedirectOrigins: ''

# GitLab is both how people sign in to the management UI and the authority on what they may do.
# Source-repo access controls app visibility; IaC-repo access controls deployment configuration.
# Register an OAuth application with scope `read_api` and redirect URI <publicBaseUrl>/login.
gitlab:
  url: https://gitlab.com
  oauthClientId: ''
  oauthClientSecret: ''

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ''
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-buffering: 'off'
  hosts:
    - host: dag.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

deployment:
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
