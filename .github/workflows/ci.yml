name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository }}/server
  CLI_IMAGE: ghcr.io/${{ github.repository }}/cli

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dag
          POSTGRES_PASSWORD: dag
          POSTGRES_DB: dag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.email "ci@zyno.io"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared
        run: yarn workspace @zyno-io/dag-shared build

      - name: Build server
        run: yarn workspace @zyno-io/dag build

      - name: Build CLI
        run: yarn workspace @zyno-io/dag-cli build

      - name: Test server
        run: yarn workspace @zyno-io/dag test
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: dag
          PG_PASSWORD_SECRET: dag
          PG_DATABASE: dag_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          BULL_REDIS_HOST: localhost
          BULL_REDIS_PORT: 6379
          BULL_QUEUE: dag
          BROADCAST_REDIS_HOST: localhost
          BROADCAST_REDIS_PORT: 6379
          CRYPTO_SECRET: test-crypto-secret-change-me-32c
          DEPLOY_MONITOR_TIMEOUT_SECS: 300

      - name: Test CLI
        run: yarn workspace @zyno-io/dag-cli test

  auto-tag:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for version changes
        id: version-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags found. Will create v$VERSION."
            echo "should_tag=true" >> "$GITHUB_OUTPUT"
          elif [ "$LATEST_TAG" != "v$VERSION" ]; then
            echo "Version changed (latest tag: $LATEST_TAG, current: v$VERSION). Will create v$VERSION."
            echo "should_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change detected (latest tag: $LATEST_TAG)."
            echo "should_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.version-check.outputs.should_tag == 'true'
        run: |
          TAG="v${{ steps.version-check.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: server-meta
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/metadata-action@v5
        id: cli-meta
        with:
          images: ${{ env.CLI_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/setup-buildx-action@v3

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push CLI
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/cli/Dockerfile
          push: true
          tags: ${{ steps.cli-meta.outputs.tags }}
          labels: ${{ steps.cli-meta.outputs.labels }}
          cache-from: type=gha,scope=cli
          cache-to: type=gha,mode=max,scope=cli

  docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build docs
        run: yarn docs:build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
